<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C3320">
  <meta name="robots" content="noindex,nofollow">
  <title>Suivi de votre rendez-vous — MiraLocks</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css?v=93424812">
  <script>
    var __theme = localStorage.getItem('Miralocks_theme') || 'light';
    document.documentElement.dataset.theme = __theme;
  </script>
  <style>
    .suivi-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg, #f9fafb);
    }
    .suivi-card {
      background: var(--bg-card, #fff);
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .suivi-logo {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin-bottom: 1rem;
    }
    .suivi-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--vert, #0C3320);
      margin-bottom: .25rem;
    }
    .suivi-subtitle {
      color: var(--gris-d, #888);
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    .statut-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      margin: 1rem 0;
    }
    .statut-en_attente  { background: #FEF3C7; color: #92400E; }
    .statut-confirme    { background: #D1FAE5; color: #065F46; }
    .statut-annule      { background: #FEE2E2; color: #991B1B; }
    .statut-termine     { background: #F3F4F6; color: #374151; }

    .rdv-details {
      background: var(--bg, #f9fafb);
      border-radius: 14px;
      padding: 1.25rem;
      margin: 1.25rem 0;
      text-align: left;
    }
    .rdv-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border, #f0f0f0);
      font-size: .9rem;
    }
    .rdv-row:last-child { border-bottom: none; }
    .rdv-icon {
      width: 28px;
      text-align: center;
      color: var(--or, #C9A84C);
      flex-shrink: 0;
    }
    .rdv-label { color: var(--gris-d, #888); font-size: .8rem; display: block; }
    .rdv-value { font-weight: 600; color: var(--text, #1a1a1a); }

    .timeline {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 1.5rem 0;
      padding: 0 .5rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      top: 18px;
      left: 10%;
      right: 10%;
      height: 3px;
      background: var(--border, #e5e7eb);
      z-index: 0;
    }
    .tl-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      z-index: 1;
      flex: 1;
    }
    .tl-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      border: 3px solid var(--border, #e5e7eb);
      background: var(--bg-card, #fff);
      color: var(--gris-d, #aaa);
      transition: all .3s;
    }
    .tl-dot.active   { background: var(--vert, #0C3320); border-color: var(--vert, #0C3320); color: #fff; }
    .tl-dot.done     { background: var(--or, #C9A84C);   border-color: var(--or, #C9A84C);   color: #fff; }
    .tl-dot.canceled { background: #ef4444; border-color: #ef4444; color: #fff; }
    .tl-label { font-size: .68rem; color: var(--gris-d, #888); text-align: center; line-height: 1.2; }
    .tl-label.active { color: var(--vert, #0C3320); font-weight: 700; }
    .tl-label.done   { color: var(--or, #C9A84C); font-weight: 600; }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: .75rem 1.75rem;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-top: 1rem;
      transition: opacity .2s;
    }
    .btn-wa:hover { opacity: .88; }

    .suivi-error {
      color: #ef4444;
      background: #fee2e2;
      border-radius: 12px;
      padding: 1.25rem;
      margin: 1rem 0;
      font-size: .9rem;
    }
    .spinner-lg {
      width: 48px; height: 48px;
      border: 4px solid var(--border, #e5e7eb);
      border-top-color: var(--or, #C9A84C);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Nav minimaliste -->
  <nav class="navbar" style="padding:.75rem 1.5rem">
    <a href="index.html" class="nav-logo" style="display:flex;align-items:center;gap:.6rem;text-decoration:none">
      <picture>
        <source srcset="assets/logo-transparent.avif" type="image/avif">
        <source srcset="assets/logo-transparent.webp" type="image/webp">
        <img src="assets/logo-transparent.png" alt="Logo Miralocks" width="36" height="36" loading="eager">
      </picture>
      <span style="font-weight:700;color:var(--vert,#0C3320)">Miralocks</span>
    </a>
    <a href="rendezvous.html" class="btn btn-or" style="font-size:.85rem;padding:.45rem 1rem">
      <i class="fas fa-calendar-plus"></i> Nouveau RDV
    </a>
  </nav>

  <main class="suivi-page">
    <div class="suivi-card" id="suivi-card">

      <!-- Logo -->
      <picture>
        <source srcset="assets/logo-or.avif" type="image/avif">
        <source srcset="assets/logo-or.webp" type="image/webp">
        <img src="assets/logo-or.png" alt="Miralocks" class="suivi-logo">
      </picture>

      <h1 class="suivi-title">Suivi de votre rendez-vous</h1>
      <p class="suivi-subtitle">Institut MiraLocks · Lomé, Togo</p>

      <!-- Contenu dynamique -->
      <div id="suivi-content">
        <div class="spinner-lg"></div>
        <p style="color:var(--gris-d);font-size:.9rem">Chargement de votre rendez-vous…</p>
      </div>

    </div>
  </main>

  <!-- Footer minimal -->
  <footer style="text-align:center;padding:1.5rem;color:var(--gris-d,#aaa);font-size:.8rem">
    © <script>document.write(new Date().getFullYear())</script> Institut MiraLocks — <a href="index.html" style="color:var(--or,#C9A84C)">Retour au site</a>
  </footer>

  <script src="js/supabase.js?v=009598ff"></script>
  <script src="js/public-features.js?v=29c11b3b"></script>
  <script>
  /* ── Page de suivi RDV ── */
  (async function initSuiviPage() {
    const content = document.getElementById('suivi-content');

    const STATUTS = {
      en_attente: { label: 'En attente de confirmation', icon: 'clock', emoji: '⏳' },
      confirme:   { label: 'Rendez-vous confirmé',       icon: 'check-circle', emoji: '✅' },
      annule:     { label: 'Rendez-vous annulé',         icon: 'times-circle', emoji: '❌' },
      termine:    { label: 'Rendez-vous terminé',        icon: 'flag-checkered', emoji: '🏁' },
    };

    const TIMELINE = ['en_attente', 'confirme', 'termine'];
    const TIMELINE_LABELS = { en_attente: 'Reçu', confirme: 'Confirmé', termine: 'Terminé' };

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function renderTimeline(statut) {
      if (statut === 'annule') {
        return `<div style="text-align:center;padding:.75rem 0">
          <div style="display:inline-flex;align-items:center;gap:.5rem;background:#fee2e2;color:#991b1b;padding:.5rem 1.25rem;border-radius:50px;font-size:.85rem;font-weight:600">
            <i class="fas fa-times-circle"></i> Rendez-vous annulé
          </div>
        </div>`;
      }

      const currentIdx = TIMELINE.indexOf(statut);
      return `<div class="timeline">
        ${TIMELINE.map((s, i) => {
          const cls = i < currentIdx ? 'done' : i === currentIdx ? 'active' : '';
          const icon = s === 'en_attente' ? 'inbox' : s === 'confirme' ? 'check' : 'flag-checkered';
          return `<div class="tl-step">
            <div class="tl-dot ${cls}"><i class="fas fa-${icon}"></i></div>
            <div class="tl-label ${cls}">${TIMELINE_LABELS[s]}</div>
          </div>`;
        }).join('')}
      </div>`;
    }

    function renderRdv(rdv) {
      const s = STATUTS[rdv.statut] || STATUTS.en_attente;
      const phone = (rdv.tel || '').replace(/\D/g, '');
      const waMsg = encodeURIComponent(`Bonjour, je souhaite avoir des informations sur mon rendez-vous du ${rdv.date_rdv}. Merci !`);

      return `
        <!-- Statut badge -->
        <div>
          <div class="statut-badge statut-${rdv.statut}">
            <i class="fas fa-${s.icon}"></i>
            ${s.label}
          </div>
        </div>

        <!-- Timeline -->
        ${renderTimeline(rdv.statut)}

        <!-- Détails -->
        <div class="rdv-details">
          <div class="rdv-row">
            <div class="rdv-icon"><i class="fas fa-user"></i></div>
            <div>
              <span class="rdv-label">Client</span>
              <span class="rdv-value">${escHtml(rdv.nom)}</span>
            </div>
          </div>
          <div class="rdv-row">
            <div class="rdv-icon"><i class="fas fa-cut"></i></div>
            <div>
              <span class="rdv-label">Service</span>
              <span class="rdv-value">${escHtml(rdv.service)}</span>
            </div>
          </div>
          <div class="rdv-row">
            <div class="rdv-icon"><i class="fas fa-calendar-day"></i></div>
            <div>
              <span class="rdv-label">Date</span>
              <span class="rdv-value">${formatDate(rdv.date_rdv)}</span>
            </div>
          </div>
          ${rdv.heure ? `<div class="rdv-row">
            <div class="rdv-icon"><i class="fas fa-clock"></i></div>
            <div>
              <span class="rdv-label">Heure</span>
              <span class="rdv-value">${escHtml(rdv.heure)}</span>
            </div>
          </div>` : ''}
          <div class="rdv-row">
            <div class="rdv-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div>
              <span class="rdv-label">Lieu</span>
              <span class="rdv-value">Institut MiraLocks, Agoè Cacaveli, Lomé</span>
            </div>
          </div>
        </div>

        <!-- Message selon statut -->
        ${rdv.statut === 'en_attente' ? `
          <p style="font-size:.85rem;color:var(--gris-d);background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:.75rem 1rem;text-align:left">
            <i class="fas fa-info-circle" style="color:#f59e0b;margin-right:.35rem"></i>
            Votre demande est en cours de traitement. Vous recevrez une confirmation par WhatsApp très bientôt.
          </p>` : ''}
        ${rdv.statut === 'confirme' ? `
          <p style="font-size:.85rem;color:#065f46;background:#d1fae5;border:1px solid #86efac;border-radius:10px;padding:.75rem 1rem;text-align:left">
            <i class="fas fa-check-circle" style="margin-right:.35rem"></i>
            Votre rendez-vous est confirmé ! Pensez à venir 5 minutes à l'avance.
          </p>` : ''}
        ${rdv.statut === 'annule' ? `
          <p style="font-size:.85rem;color:#991b1b;background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:.75rem 1rem;text-align:left">
            <i class="fas fa-times-circle" style="margin-right:.35rem"></i>
            Ce rendez-vous a été annulé. Contactez-nous pour en reprogrammer un nouveau.
          </p>` : ''}

        <!-- Actions -->
        <div style="display:flex;flex-direction:column;gap:.75rem;margin-top:.5rem">
          ${phone ? `<a href="https://wa.me/${phone}?text=${waMsg}" target="_blank" rel="noopener" class="btn-wa">
            <i class="fab fa-whatsapp"></i> Contacter Miralocks
          </a>` : ''}
          <a href="rendezvous.html" style="display:inline-flex;align-items:center;gap:.4rem;justify-content:center;color:var(--or,#C9A84C);font-size:.88rem;text-decoration:none;margin-top:.25rem">
            <i class="fas fa-calendar-plus"></i> Prendre un nouveau rendez-vous
          </a>
        </div>
      `;
    }

    function renderError(msg) {
      return `
        <div class="suivi-error">
          <i class="fas fa-exclamation-triangle" style="margin-right:.5rem"></i>
          ${msg}
        </div>
        <p style="font-size:.85rem;color:var(--gris-d);margin-top:1rem">
          Si vous pensez qu'il s'agit d'une erreur, contactez-nous directement.
        </p>
        <a href="https://wa.me/22897989001" target="_blank" rel="noopener" class="btn-wa" style="margin-top:.75rem">
          <i class="fab fa-whatsapp"></i> Nous contacter
        </a>
        <div style="margin-top:1rem">
          <a href="rendezvous.html" style="color:var(--or,#C9A84C);font-size:.85rem">→ Prendre un nouveau rendez-vous</a>
        </div>`;
    }

    /* ── Charger le RDV ── */
    try {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const token = params.get('token');

      if (!id || !token) {
        content.innerHTML = renderError('Lien de suivi invalide ou incomplet.');
        return;
      }

      /* Attendre que sb soit disponible */
      let tries = 0;
      while (typeof sb === 'undefined' && tries < 20) {
        await new Promise(r => setTimeout(r, 100));
        tries++;
      }
      if (typeof sb === 'undefined') {
        content.innerHTML = renderError('Impossible de charger les données. Vérifiez votre connexion.');
        return;
      }

      const rdv = await window.RDVTracker.loadFromUrl();

      if (!rdv) {
        content.innerHTML = renderError('Rendez-vous introuvable ou lien expiré.<br>Ce lien est unique et lié à votre numéro de téléphone.');
        return;
      }

      content.innerHTML = renderRdv(rdv);

    } catch (e) {
      content.innerHTML = renderError('Une erreur est survenue : ' + e.message);
    }
  })();
  </script>
  <script src="js/ai-core.js?v=d0d719cf"></script>
  <script src="js/chatbot-public.js?v=16ced422"></script>
</body>
</html>
